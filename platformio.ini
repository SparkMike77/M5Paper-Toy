; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[env:m5stack-paper]
platform = espressif32@^7.0.1
board = m5stack-paper
framework = arduino
board_build.partitions = default_16MB.csv
build_flags =
	-DCORE_DEBUG_LEVEL=4
upload_speed = 2000000
monitor_speed = 115200
monitor_filters = esp32_exception_decoder
lib_deps =
	m5stack/M5EPD@^0.1.5

; No upload_port/monitor_port set above so this project builds identically on
; any machine. Once the M5Paper is plugged in, either:
;   1) pass it on the command line:  pio run -t upload --upload-port COM9
;   2) or uncomment and set the two lines below to your device's COM port
;      (check Windows Device Manager > Ports; this v1.1 unit enumerates as
;      "USB-Enhanced-SERIAL CH9102", not the CP210x some M5Paper docs mention)
;
; upload_port = COM9
; monitor_port = COM9
